services:
  database:
    image: mysql:8.0
    container_name: greenhouse_db_container
    restart: always
    environment:
      - TZ=America/Toronto
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${GREEN_DB_USER}
      - MYSQL_PASSWORD=${GREEN_DB_PASS}
    volumes:
      - greenhouse_db_data:/var/lib/mysql
    networks:
      - iot-network

  greenhouse-service:
    build: 
      context: .
      args:
        # This passes the URL to React during the 'npm run build' phase
        - REACT_APP_API_URL=${REACT_APP_GREEN_API_URL}
    environment:
      - TZ=America/Toronto
      - API_PORT=${API_PORT}
      - BIND_HOST=${BIND_HOST}
      - DB_HOST=database
      - DB_NAME=${DB_NAME}
      - DB_USER=${GREEN_DB_USER}
      - DB_PASS=${GREEN_DB_PASS}
    restart: always
    ports:
      - "${GREEN_API_PORT}:${API_PORT}"   
      - "${COLLECTOR_PORT}:${COLLECTOR_PORT}"
    env_file: .env
    depends_on:
      - database
    networks:
      - iot-network

networks:
  # Using a named network makes it easier for IOTServer to join later
  iot-network:
    driver: bridge

volumes:
  greenhouse_db_data: